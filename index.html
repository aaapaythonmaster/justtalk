<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>talk with me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #E5E5EA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: #F2F2F7;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background-color: #FFFFFF;
            color: #000000;
            padding: 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #E5E5EA;
        }
        
        .chat-header h1 {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
        }
        
        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmNWY1ZjgiIGZpbGwtb3BhY2l0eT0iMC4xIj48cGF0aCBkPSJNMzYgMzRoLTJ2LTJoMnYyem0wLTRoLTJ2LTJoMnYyem0wLTRoLTJ2LTJoMnYyem0wLTRoLTJ2LTJoMnYyem0tNCA0aDJ2LTJoLTJ2MnoiLz48L2c+PC9nPjwvc3ZnPg==');
        }
        
        .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 16px;
        }
        
        .user-message {
            align-self: flex-end;
            background-color: #007AFF;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            align-self: flex-start;
            background-color: #FFFFFF;
            color: #000000;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .chat-footer {
            background-color: #FFFFFF;
            padding: 10px 16px;
            border-top: 1px solid #E5E5EA;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #E5E5EA;
            border-radius: 20px;
            font-size: 16px;
            outline: none;
            background-color: #F2F2F7;
        }
        
        .send-button {
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            transition: background-color 0.2s;
        }
        
        .send-button:hover {
            background-color: #0066CC;
        }
        
        .typing-indicator {
            align-self: flex-start;
            background-color: #FFFFFF;
            border-radius: 18px;
            padding: 10px 16px;
            display: flex;
            gap: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background-color: #8E8E93;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>日常英语聊天</h1>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="bot-message">
                <p>Hello! How can I help you practice English today?</p>
            </div>
        </div>
        <div class="chat-footer">
            <input type="text" class="chat-input" id="chat-input" placeholder="Type your message...">
            <button class="send-button" id="send-button">➤</button>
        </div>
    </div>
    
    <script>
        const chatBody = document.getElementById('chat-body');
        const chatInput = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        
        function addMessage(message, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? 'user-message' : 'bot-message';
            messageDiv.innerHTML = `<p>${message}</p>`;
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }
        
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatBody.appendChild(typingDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typing-indicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }
        
        function getBotResponse(message) {
            // 简单的预设回复，实际项目中可以调用API
            const responses = [
                "That's interesting! Tell me more about it.",
                "How do you feel about that?",
                "What else would you like to talk about?",
                "Can you elaborate on that?",
                "That's a good point!",
                "I understand what you're saying.",
                "What's your opinion on this?",
                "How has your day been so far?"
            ];
            
            return responses[Math.floor(Math.random() * responses.length)];
        }
        
        function handleSendMessage() {
            const message = chatInput.value.trim();
            if (message) {
                addMessage(message, true);
                chatInput.value = '';
                
                showTypingIndicator();
                
                // 模拟API响应延迟
                setTimeout(() => {
                    removeTypingIndicator();
                    const botResponse = getBotResponse(message);
                    addMessage(botResponse);
                }, 1000);
            }
        }
        
        sendButton.addEventListener('click', handleSendMessage);
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSendMessage();
            }
        });
    </script>
</body>
</html>
